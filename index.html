<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지금 뜨는 키워드</title>
<style>
  :root {
    --toss-blue: #3182F6;
    --toss-red: #F04452;
    --bg: #F2F4F6;
    --card: #FFFFFF;
    --text: #191F28;
    --text-2: #4E5968;
    --text-3: #8B95A1;
    --line: #E5E8EB;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #17171C;
      --card: #232328;
      --text: #F2F4F6;
      --text-2: #B0B8C1;
      --text-3: #6B7684;
      --line: #2E2E35;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Malgun Gothic", sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.5; padding: 20px 16px 40px;
  }
  .wrap { max-width: 480px; margin: 0 auto; }

  .top { display: flex; align-items: center; justify-content: space-between; padding: 4px 4px 18px; }
  .top .date { font-size: 13px; color: var(--text-3); margin-bottom: 3px; }
  .top h1 { font-size: 21px; font-weight: 700; letter-spacing: -0.5px; }
  .refresh {
    width: 40px; height: 40px; border-radius: 50%; background: var(--card);
    border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: var(--text-2); font-size: 18px;
  }
  .refresh:active { transform: scale(0.94); }

  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .stat { background: var(--card); border-radius: 16px; padding: 16px; }
  .stat .label { font-size: 13px; color: var(--text-2); margin-bottom: 8px; }
  .stat .num { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .stat .num .unit { font-size: 15px; color: var(--text-3); font-weight: 400; }

  .card { background: var(--card); border-radius: 16px; margin-bottom: 10px; }
  .card.pad { padding: 18px 16px; }

  .tabs { display: flex; gap: 8px; padding: 14px 16px 4px; }
  .tab {
    font-size: 13px; padding: 7px 16px; border-radius: 999px; border: none; cursor: pointer;
    background: var(--bg); color: var(--text-2); font-weight: 500;
  }
  .tab.on { background: var(--toss-blue); color: #fff; }
  .sub-note { font-size: 12px; color: var(--text-3); padding: 10px 16px 0; line-height: 1.5; }

  .kw-list { padding: 4px 16px 8px; }
  .kw {
    display: flex; align-items: center; gap: 12px; padding: 12px 0;
    border-bottom: 1px solid var(--line); cursor: pointer; text-decoration: none; color: inherit;
  }
  .kw:last-child { border-bottom: none; }
  .kw:active { opacity: 0.6; }
  .kw .rank { font-size: 16px; font-weight: 700; color: var(--toss-blue); width: 18px; letter-spacing: -0.5px; flex-shrink: 0; }
  .kw .body { flex: 1 1 auto; min-width: 0; overflow: hidden; }
  .kw .word { display: block; max-width: 100%; font-size: 15px; font-weight: 500; letter-spacing: -0.3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .kw .news { display: block; max-width: 100%; font-size: 12px; color: var(--text-3); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  /* 오른쪽 메타(시간/NEW)는 절대 줄어들지 않게 → 텍스트가 이 영역을 침범하지 못함 */
  .kw .meta { display: flex; align-items: center; gap: 8px; flex: 0 0 auto; flex-shrink: 0; white-space: nowrap; }
  .kw .hrs { font-size: 12px; color: var(--text-3); }
  .badge-new { font-size: 11px; font-weight: 700; color: var(--toss-blue); background: rgba(49,130,246,0.1); padding: 2px 8px; border-radius: 999px; }
  .badge-peak { font-size: 11px; font-weight: 500; color: var(--text-2); background: var(--bg); padding: 2px 8px; border-radius: 999px; }
  .delta-up { font-size: 12px; color: var(--toss-red); font-weight: 700; }
  .delta-down { font-size: 12px; color: var(--toss-blue); font-weight: 700; }
  .delta-same { font-size: 13px; color: var(--text-3); }
  .yt-rank { font-size: 14px; font-weight: 700; color: var(--toss-blue); width: 16px; flex-shrink: 0; text-align: center; }

  .sec-title { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
  .sec-sub { font-size: 13px; color: var(--text-2); margin-bottom: 14px; }

  .empty { text-align: center; padding: 40px 20px; color: var(--text-3); }
  .empty .big { font-size: 15px; color: var(--text-2); margin-bottom: 6px; font-weight: 500; }
  .empty .small { font-size: 13px; line-height: 1.7; }

  .yt { display: flex; align-items: center; gap: 12px; padding: 10px 0; text-decoration: none; color: inherit; }
  .yt:active { opacity: 0.6; }
  .yt .thumb { width: 76px; height: 46px; border-radius: 10px; background: var(--bg); flex-shrink: 0; object-fit: cover; display: flex; align-items: center; justify-content: center; color: var(--text-3); font-size: 16px; }
  .yt .info { flex: 1 1 auto; min-width: 0; overflow: hidden; }
  .yt .t { display: block; max-width: 100%; font-size: 14px; font-weight: 500; letter-spacing: -0.3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .yt .c { display: block; max-width: 100%; font-size: 12px; color: var(--text-3); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .yt-hint { font-size: 12px; color: var(--text-3); line-height: 1.7; padding: 4px 0; }

  .foot { font-size: 11px; color: var(--text-3); text-align: center; margin-top: 16px; line-height: 1.6; }
  .foot a { color: var(--text-3); }
</style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <div>
      <div class="date" id="date">불러오는 중…</div>
      <h1>지금 뜨는 키워드</h1>
    </div>
    <button class="refresh" id="refresh" aria-label="새로고침">&#x21bb;</button>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="label" id="stat-label-1">신규 진입</div>
      <div class="num" id="stat-new">–<span class="unit">개</span></div>
    </div>
    <div class="stat">
      <div class="label" id="stat-label-2">3시간+ 유지</div>
      <div class="num" id="stat-stay">–<span class="unit">개</span></div>
    </div>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab on" data-tab="now">지금</button>
      <button class="tab" data-tab="prev">1시간 전</button>
      <button class="tab" data-tab="today">오늘</button>
    </div>
    <div class="sub-note" id="sub-note"></div>
    <div class="kw-list" id="kw-list">
      <div class="empty"><div class="small">불러오는 중…</div></div>
    </div>
  </div>

  <div class="card pad" id="yt-card">
    <div class="sec-title">인기 영상</div>
    <div class="sec-sub">지금 한국 유튜브에서 많이 보는 영상</div>
    <div id="yt-list">
      <div class="yt-hint">불러오는 중…</div>
    </div>
  </div>

  <div class="foot">
    데이터: 구글 트렌드 · 유튜브 (한국) · 1시간마다 자동 갱신<br>
    <span id="updated"></span>
  </div>

</div>

<script>
let STATE = { latest: null, history: [], tab: "now" };

async function loadJSON(path) {
  const res = await fetch(path + "?t=" + Date.now());
  if (!res.ok) throw new Error(path + " 없음");
  return res.json();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

function showEmpty() {
  document.getElementById("date").textContent = "데이터 준비 중";
  document.getElementById("kw-list").innerHTML =
    '<div class="empty">' +
    '<div class="big">아직 수집된 데이터가 없어요</div>' +
    '<div class="small">GitHub Actions가 처음 한 번 돌면<br>여기에 키워드가 채워집니다.<br>' +
    'Actions 탭에서 워크플로우를 수동 실행해보세요.</div></div>';
}

// 한 키워드 행 HTML 생성. rightHtml = 오른쪽 메타 영역(시간/변동/점수 등)
function rowHtml(rank, keyword, news, rightHtml) {
  const newsTitle = news && news.title ? news.title : "";
  const newsSrc = news && news.source ? news.source : "";
  const href = news && news.url ? news.url : ("https://search.naver.com/search.naver?query=" + encodeURIComponent(keyword));
  const newsLine = newsTitle ? (newsTitle + (newsSrc ? " · " + newsSrc : "")) : "관련 뉴스 보기";
  return '<a class="kw" href="' + href + '" target="_blank" rel="noopener">' +
    '<span class="rank">' + rank + '</span>' +
    '<span class="body"><span class="word">' + escapeHtml(keyword) + '</span>' +
    '<span class="news">' + escapeHtml(newsLine) + '</span></span>' +
    '<span class="meta">' + rightHtml + '</span></a>';
}

// 오늘(KST) 0시 이후의 스냅샷만 추리기
function todaySnapshots(history) {
  if (history.length === 0) return [];
  // 가장 최신 스냅샷의 날짜를 '오늘'로 본다
  const lastDate = new Date(history[history.length - 1].timestamp);
  const y = lastDate.getFullYear(), m = lastDate.getMonth(), d = lastDate.getDate();
  return history.filter(s => {
    const t = new Date(s.timestamp);
    return t.getFullYear() === y && t.getMonth() === m && t.getDate() === d;
  });
}

// 최신 스냅샷 시각에서 hoursBack 시간 전에 "가장 가까운" 스냅샷을 찾는다.
// 단순히 끝에서 N번째를 쓰면 수집이 밀렸을 때 라벨이 거짓이 되므로,
// 실제 timestamp 기준으로 목표 시각과의 차이가 가장 작은 스냅샷을 고른다.
// 최신 스냅샷 자신과 너무 가까운(30분 미만 차이) 것은 제외해 '지금'과 겹치지 않게 한다.
function snapshotHoursAgo(history, hoursBack) {
  if (history.length < 2) return null;
  const latestT = new Date(history[history.length - 1].timestamp).getTime();
  const targetT = latestT - hoursBack * 3600000;
  const MIN_GAP = 30 * 60000; // 최신과 최소 30분은 떨어져 있어야 함

  let best = null, bestDiff = Infinity;
  for (let i = 0; i < history.length - 1; i++) {
    const t = new Date(history[i].timestamp).getTime();
    if (latestT - t < MIN_GAP) continue; // 최신과 너무 붙은 스냅샷 제외
    const diff = Math.abs(t - targetT);
    if (diff < bestDiff) { bestDiff = diff; best = history[i]; }
  }
  return best;
}

// ===== 탭별 렌더링 =====
function render() {
  const { latest, history, tab } = STATE;
  const listEl = document.getElementById("kw-list");
  const noteEl = document.getElementById("sub-note");
  const l1 = document.getElementById("stat-label-1");
  const l2 = document.getElementById("stat-label-2");
  const n1 = document.getElementById("stat-new");
  const n2 = document.getElementById("stat-stay");

  if (tab === "now") {
    // 지금: 최신 스냅샷 10개. '최신 -1시간'에 가장 가까운 스냅샷과 비교해 변동 표시.
    const prev = snapshotHoursAgo(history, 1);
    const prevRank = {};
    if (prev) prev.items.forEach((it, i) => { prevRank[it.keyword] = i + 1; });

    let newCount = 0;
    const rows = latest.items.slice(0, 10).map((it, i) => {
      const rank = i + 1;
      const pr = prev ? prevRank[it.keyword] : undefined;
      let delta;
      if (!prev) { delta = '<span class="delta-same">&ndash;</span>'; }
      else if (pr === undefined) { delta = '<span class="badge-new">NEW</span>'; newCount++; }
      else if (rank < pr) delta = '<span class="delta-up">&#9650;' + (pr - rank) + '</span>';
      else if (rank > pr) delta = '<span class="delta-down">&#9660;' + (rank - pr) + '</span>';
      else delta = '<span class="delta-same">&ndash;</span>';
      return rowHtml(rank, it.keyword, it.news, delta);
    });
    listEl.innerHTML = rows.join("");
    // 비교 대상이 실제로 몇 시간 전인지 정직하게 표기
    noteEl.textContent = prev
      ? ("지금 급상승 중인 키워드 · " + prev.label + " 대비 순위 변동")
      : "지금 급상승 중인 키워드";
    l1.textContent = "신규 진입"; n1.innerHTML = newCount + '<span class="unit">개</span>';
    l2.textContent = "표시 키워드"; n2.innerHTML = rows.length + '<span class="unit">개</span>';

  } else if (tab === "prev") {
    // 1시간 전: '최신 -1시간'에 가장 가까운 스냅샷을 찾아 표시 (단순 직전 아님)
    const prev = snapshotHoursAgo(history, 1);
    if (!prev) {
      listEl.innerHTML = '<div class="empty"><div class="small">아직 1시간 전 기록이 없어요.<br>한 시간 더 지나면 표시됩니다.</div></div>';
      noteEl.textContent = "한 시간 전 순위";
      l1.textContent = "—"; n1.innerHTML = "–<span class=\"unit\"></span>";
      l2.textContent = "—"; n2.innerHTML = "–<span class=\"unit\"></span>";
      return;
    }
    // 최신 시각 대비 실제 몇 시간 전인지 계산 (라벨 정직성)
    const latestT = new Date(latest.timestamp).getTime();
    const gapH = (latestT - new Date(prev.timestamp).getTime()) / 3600000;
    const gapText = gapH < 1.5 ? "약 1시간 전" : ("약 " + Math.round(gapH) + "시간 전");

    const rows = prev.items.slice(0, 10).map((it, i) =>
      rowHtml(i + 1, it.keyword, it.news, '<span class="hrs">' + prev.label + '</span>')
    );
    listEl.innerHTML = rows.join("");
    noteEl.textContent = prev.label + " 기준 순위 (" + gapText + ")";
    l1.textContent = "기준 시각"; n1.innerHTML = prev.label.replace(":", '<span class="unit">:</span>');
    l2.textContent = "표시 키워드"; n2.innerHTML = rows.length + '<span class="unit">개</span>';

  } else if (tab === "today") {
    // 오늘: 0시 이후 모든 스냅샷에서 순위 점수(1위=10점…10위=1점)를 합산
    const snaps = todaySnapshots(history);
    const score = {};      // 키워드 -> 누적 점수
    const appear = {};     // 키워드 -> 등장 스냅샷 수
    const lastNews = {};   // 키워드 -> 가장 최근 뉴스
    const peak = {};       // 키워드 -> 최고 순위
    snaps.forEach(s => {
      s.items.slice(0, 10).forEach((it, i) => {
        const rank = i + 1;
        score[it.keyword] = (score[it.keyword] || 0) + (11 - rank);
        appear[it.keyword] = (appear[it.keyword] || 0) + 1;
        peak[it.keyword] = Math.min(peak[it.keyword] || 99, rank);
        if (it.news) lastNews[it.keyword] = it.news;
      });
    });
    const ranked = Object.keys(score)
      .sort((a, b) => score[b] - score[a])
      .slice(0, 10);

    if (ranked.length === 0) {
      listEl.innerHTML = '<div class="empty"><div class="small">오늘 수집된 데이터가 아직 없어요.</div></div>';
    } else {
      const rows = ranked.map((kw, i) => {
        const hrs = appear[kw];
        const right = '<span class="hrs">' + hrs + '회</span>' +
          '<span class="badge-peak">최고 ' + peak[kw] + '위</span>';
        return rowHtml(i + 1, kw, lastNews[kw], right);
      });
      listEl.innerHTML = rows.join("");
    }
    const longest = ranked.length ? Math.max(...ranked.map(k => appear[k])) : 0;
    noteEl.textContent = "오늘 0시부터 지금까지 가장 오래·높이 떠 있던 키워드 (스냅샷 " + snaps.length + "개 누적)";
    l1.textContent = "오늘 추적 키워드"; n1.innerHTML = Object.keys(score).length + '<span class="unit">개</span>';
    l2.textContent = "최장 등장"; n2.innerHTML = longest + '<span class="unit">회</span>';
  }
}

function setTab(tab) {
  STATE.tab = tab;
  document.querySelectorAll(".tab").forEach(b =>
    b.classList.toggle("on", b.dataset.tab === tab));
  render();
}

async function loadYoutube() {
  const card = document.getElementById("yt-card");
  const list = document.getElementById("yt-list");
  try {
    const yt = await loadJSON("data/youtube.json");
    if (!yt.items || yt.items.length === 0) { card.style.display = "none"; return; }

    list.innerHTML = yt.items.slice(0, 10).map((v, i) => {
      const thumb = v.thumbnail
        ? '<img class="thumb" src="' + escapeHtml(v.thumbnail) + '" alt="" loading="lazy">'
        : '<span class="thumb">&#9654;</span>';
      const meta = (v.channel ? escapeHtml(v.channel) : "") +
        (v.views_text ? " · 조회 " + escapeHtml(v.views_text) : "");
      return '<a class="yt" href="' + (v.url || "#") + '" target="_blank" rel="noopener">' +
        '<span class="yt-rank">' + (i + 1) + '</span>' +
        thumb +
        '<span class="info"><span class="t">' + escapeHtml(v.title) + '</span>' +
        '<span class="c">' + meta + '</span></span></a>';
    }).join("");
  } catch (e) {
    console.warn(e);
    card.style.display = "none";
  }
}

async function init() {
  try {
    const [latest, history] = await Promise.all([
      loadJSON("data/latest.json"),
      loadJSON("data/history.json"),
    ]);
    STATE.latest = latest;
    STATE.history = history;

    const d = new Date(latest.timestamp);
    const days = ["일","월","화","수","목","금","토"];
    document.getElementById("date").textContent =
      d.getFullYear() + "." + String(d.getMonth()+1).padStart(2,"0") + "." +
      String(d.getDate()).padStart(2,"0") + " " + days[d.getDay()] + " " + latest.label;
    document.getElementById("updated").textContent = "마지막 갱신 " + latest.label;

    document.querySelectorAll(".tab").forEach(b =>
      b.addEventListener("click", () => setTab(b.dataset.tab)));

    render();
  } catch (e) {
    console.warn(e);
    showEmpty();
  }
  loadYoutube();
}

document.getElementById("refresh").addEventListener("click", () => location.reload());
init();
</script>
</body>
</html>
