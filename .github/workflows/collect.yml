name: 트렌드 수집 (1시간마다)

# 언제 실행할지
on:
  schedule:
    # 매시 정각마다 실행 (UTC 기준 cron). 정확히 정각이 아닐 수 있고
    # GitHub 부하 상황에 따라 몇 분 지연될 수 있음 — 1시간 단위에는 문제없음.
    - cron: "0 * * * *"
  # 수동 실행 버튼도 추가 (탭에서 바로 한 번 돌려볼 수 있게)
  workflow_dispatch:

# 저장소에 커밋하려면 쓰기 권한 필요
permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 트렌드 수집 실행
        run: python fetch_trends.py

      - name: 유튜브 인기 영상 수집 실행
        # YOUTUBE_API_KEY Secret을 환경변수로 전달.
        # Secret이 없으면 스크립트가 알아서 건너뛰므로 이 단계는 항상 통과한다.
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python fetch_youtube.py

      - name: 변경분 커밋 & 푸시
        run: |
          git config user.name "trend-bot"
          git config user.email "trend-bot@users.noreply.github.com"
          git add data/
          # 변경이 있을 때만 커밋 (없으면 그냥 통과)
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "트렌드 갱신: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
